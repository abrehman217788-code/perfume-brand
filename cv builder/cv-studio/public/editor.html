<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor | CV Studio</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        main {
            flex: 1;
            display: flex;
            background: #eef1f5;
        }
        .sidebar {
            width: 400px;
            background: white;
            border-right: 1px solid rgba(46, 58, 89, 0.1);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }
        .preview-area {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            display: flex;
            justify-content: center;
        }
        .cv-canvas {
            width: 794px; /* A4 width in px at 96dpi */
            min-height: 1123px; /* A4 height */
            background: white;
            box-shadow: 0 0 40px rgba(0,0,0,0.1);
            padding: 60px;
            transition: all 0.3s ease;
        }
        .section-editor {
            padding: 24px;
            border-bottom: 1px solid rgba(46, 58, 89, 0.05);
        }
        .section-editor h3 {
            font-size: 18px;
            margin-bottom: 16px;
            color: var(--primary);
            font-weight: 600;
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 6px;
            color: var(--on-surface-variant);
        }
        .form-group input, .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid rgba(46, 58, 89, 0.2);
            border-radius: var(--radius-sm);
            font-family: var(--font-sans);
            font-size: 14px;
        }
        .form-group input:focus {
            border-color: var(--primary);
            outline: none;
        }
        /* CV Content Styles */
        .cv-header h1 { font-size: 36px; margin-bottom: 8px; color: var(--primary); }
        .cv-header p { font-size: 16px; color: var(--on-surface-variant); margin-bottom: 4px; }
        .cv-section { margin-top: 32px; }
        .cv-section h2 { font-size: 18px; border-bottom: 1px solid var(--primary); padding-bottom: 4px; margin-bottom: 16px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--primary); font-weight: 700; }
        .cv-item { margin-bottom: 16px; }
        .cv-item h3 { font-size: 16px; font-weight: 700; margin-bottom: 2px; }
        .cv-item .meta { font-size: 14px; color: var(--on-surface-variant); margin-bottom: 8px; font-style: italic; }
        .cv-item p { font-size: 14px; }
    </style>
</head>
<body>
    <nav style="height: 60px;">
        <div class="container" style="display: flex; justify-content: space-between; width: 100%; align-items: center;">
            <a href="index.html" class="logo" style="font-size: 20px;">CV Studio</a>
            <div style="display: flex; gap: 12px;">
                <button onclick="saveCurrentCv()" class="btn btn-primary" style="padding: 8px 16px; font-size: 14px;">Save Project</button>
                <a href="dashboard.html" class="btn btn-secondary" style="padding: 8px 16px; font-size: 14px;">Exit</a>
            </div>
        </div>
    </nav>

    <main>
        <div class="sidebar">
            <div class="section-editor">
                <h3>Personal Info</h3>
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="input-name" placeholder="John Doe" oninput="updatePreview()">
                </div>
                <div class="form-group">
                    <label>Job Title</label>
                    <input type="text" id="input-title" placeholder="Senior Designer" oninput="updatePreview()">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="input-email" placeholder="john@example.com" oninput="updatePreview()">
                </div>
                <div class="form-group">
                    <label>Location</label>
                    <input type="text" id="input-location" placeholder="New York, NY" oninput="updatePreview()">
                </div>
            </div>

            <div class="section-editor">
                <h3>Summary</h3>
                <div class="form-group">
                    <label>Professional Summary</label>
                    <textarea id="input-summary" rows="4" oninput="updatePreview()" placeholder="Highly motivated professional..."></textarea>
                </div>
            </div>

            <div class="section-editor">
                <h3>Experience</h3>
                <div id="experience-inputs">
                    <!-- Dynamic experience inputs -->
                </div>
                <button onclick="addExperience()" class="btn btn-secondary" style="width: 100%; justify-content: center; font-size: 13px;">+ Add Experience</button>
            </div>
        </div>

        <div class="preview-area">
            <div class="cv-canvas" id="cv-canvas">
                <div class="cv-header">
                    <h1 id="preview-name">Your Name</h1>
                    <p id="preview-title">Job Title</p>
                    <p><span id="preview-email">email@example.com</span> | <span id="preview-location">Location</span></p>
                </div>
                
                <div class="cv-section">
                    <h2>Summary</h2>
                    <p id="preview-summary">Write a brief summary of your professional background and goals.</p>
                </div>

                <div class="cv-section">
                    <h2>Experience</h2>
                    <div id="preview-experience">
                        <!-- Experience items will appear here -->
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <script>
        let cvData = {
            id: null,
            name: '',
            title: '',
            email: '',
            location: '',
            summary: '',
            experience: []
        };

        async function initEditor() {
            const id = getQueryParam('id');
            if (id) {
                const existing = await fetchCv(id);
                if (existing) {
                    cvData = existing;
                    fillForm();
                }
            } else {
                // Default experience if new
                addExperience();
            }
            updatePreview();
        }

        function fillForm() {
            document.getElementById('input-name').value = cvData.name;
            document.getElementById('input-title').value = cvData.title;
            document.getElementById('input-email').value = cvData.email;
            document.getElementById('input-location').value = cvData.location;
            document.getElementById('input-summary').value = cvData.summary;
            
            renderExperienceInputs();
        }

        function renderExperienceInputs() {
            const container = document.getElementById('experience-inputs');
            container.innerHTML = cvData.experience.map((exp, index) => `
                <div style="margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px dashed #eee;">
                    <div class="form-group">
                        <label>Company</label>
                        <input type="text" value="${exp.company}" oninput="updateExp(${index}, 'company', this.value)">
                    </div>
                    <div class="form-group">
                        <label>Role</label>
                        <input type="text" value="${exp.role}" oninput="updateExp(${index}, 'role', this.value)">
                    </div>
                    <div class="form-group">
                        <label>Years</label>
                        <input type="text" value="${exp.years}" oninput="updateExp(${index}, 'years', this.value)">
                    </div>
                    <div class="form-group">
                        <label>Description</label>
                        <textarea oninput="updateExp(${index}, 'desc', this.value)">${exp.desc}</textarea>
                    </div>
                    <button onclick="removeExperience(${index})" style="color: var(--error); background: none; font-size: 12px; font-weight: 600;">Remove</button>
                </div>
            `).join('');
        }

        function addExperience() {
            cvData.experience.push({ company: '', role: '', years: '', desc: '' });
            renderExperienceInputs();
            updatePreview();
        }

        function updateExp(index, field, value) {
            cvData.experience[index][field] = value;
            updatePreview();
        }

        function removeExperience(index) {
            cvData.experience.splice(index, 1);
            renderExperienceInputs();
            updatePreview();
        }

        function updatePreview() {
            // Update data from top inputs
            cvData.name = document.getElementById('input-name').value || 'Your Name';
            cvData.title = document.getElementById('input-title').value || 'Job Title';
            cvData.email = document.getElementById('input-email').value || 'email@example.com';
            cvData.location = document.getElementById('input-location').value || 'Location';
            cvData.summary = document.getElementById('input-summary').value || 'Professional summary...';

            // Update preview elements
            document.getElementById('preview-name').textContent = cvData.name;
            document.getElementById('preview-title').textContent = cvData.title;
            document.getElementById('preview-email').textContent = cvData.email;
            document.getElementById('preview-location').textContent = cvData.location;
            document.getElementById('preview-summary').textContent = cvData.summary;

            const expPreview = document.getElementById('preview-experience');
            expPreview.innerHTML = cvData.experience.map(exp => `
                <div class="cv-item">
                    <h3>${exp.role || 'Role'}</h3>
                    <div class="meta">${exp.company || 'Company'} | ${exp.years || 'Years'}</div>
                    <p>${exp.desc || 'Description of your achievements...'}</p>
                </div>
            `).join('');
        }

        async function saveCurrentCv() {
            const saved = await saveCv(cvData);
            if (saved) {
                cvData.id = saved.id;
                alert('Project saved successfully!');
            }
        }

        document.addEventListener('DOMContentLoaded', initEditor);
    </script>
</body>
</html>
