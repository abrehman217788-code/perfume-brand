<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My CVs | CV Studio</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav>
        <div class="container" style="display: flex; justify-content: space-between; width: 100%; align-items: center;">
            <a href="index.html" class="logo">CV Studio</a>
            <div class="nav-links">
                <a href="gallery.html">Templates</a>
                <a href="dashboard.html" style="color: var(--primary);">My CVs</a>
                <a href="editor.html" class="btn btn-primary">Create Now</a>
            </div>
        </div>
    </nav>

    <main class="container" style="padding: 64px 24px;">
        <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 48px;">
            <div>
                <h1 style="font-size: 48px; margin-bottom: 16px;">Welcome back, <br><span style="font-style: italic;">Professional.</span></h1>
                <p style="color: var(--on-surface-variant); font-size: 18px;">Manage your saved CVs and drafts.</p>
            </div>
            <a href="gallery.html" class="btn btn-primary">New Project</a>
        </div>

        <div id="cv-list" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 24px;">
            <!-- CVs will be loaded here -->
            <div id="no-cvs" style="grid-column: 1/-1; text-align: center; padding: 100px 0; background: white; border-radius: 16px; border: 2px dashed rgba(46, 58, 89, 0.1);">
                <p style="color: var(--on-surface-variant); font-size: 18px; margin-bottom: 24px;">You haven't created any CVs yet.</p>
                <a href="gallery.html" class="btn btn-secondary">Create your first CV</a>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <script>
        async function loadUserCvs() {
            const cvs = await fetchCvs();
            const list = document.getElementById('cv-list');
            const noCvs = document.getElementById('no-cvs');

            if (cvs.length > 0) {
                noCvs.style.display = 'none';
                list.innerHTML = cvs.map(cv => `
                    <div class="masonry-item" style="padding: 0;">
                        <div style="height: 200px; background: #eef1f5; display: flex; align-items: center; justify-content: center; font-family: var(--font-serif); font-size: 40px; color: var(--primary); opacity: 0.5;">
                            CV
                        </div>
                        <div style="padding: 20px;">
                            <h3 style="font-size: 20px; margin-bottom: 8px;">${cv.name || 'Untitled CV'}</h3>
                            <p style="font-size: 14px; color: var(--on-surface-variant); margin-bottom: 20px;">Last updated: ${new Date(parseInt(cv.id)).toLocaleDateString()}</p>
                            <div style="display: flex; gap: 12px;">
                                <a href="editor.html?id=${cv.id}" class="btn btn-secondary" style="flex: 1; justify-content: center; font-size: 14px; padding: 8px;">Edit</a>
                                <button onclick="handleDelete('${cv.id}')" class="btn" style="background: rgba(186, 26, 26, 0.1); color: var(--error); padding: 8px 12px;">Delete</button>
                            </div>
                        </div>
                    </div>
                `).join('');
            }
        }

        async function handleDelete(id) {
            if (confirm('Are you sure you want to delete this CV?')) {
                const success = await deleteCv(id);
                if (success) {
                    loadUserCvs();
                }
            }
        }

        document.addEventListener('DOMContentLoaded', loadUserCvs);
    </script>
</body>
</html>
