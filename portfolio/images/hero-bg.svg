<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="50%" stop-color="#111111"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2a2a2a" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#1a1a1a" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="g2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3a3a3a" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#0a0a0a" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0.05"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="80" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="1440" height="900" fill="url(#bg)"/>
  <rect width="1440" height="900" fill="url(#accent)"/>
  <circle cx="1200" cy="200" r="300" fill="#6366f1" opacity="0.06" filter="url(#glow)"/>
  <circle cx="200" cy="700" r="250" fill="#8b5cf6" opacity="0.05" filter="url(#glow)"/>
  <circle cx="700" cy="450" r="200" fill="#6366f1" opacity="0.03" filter="url(#glow)"/>
  <line x1="0" y1="0" x2="0" y2="900" stroke="#ffffff" stroke-opacity="0.02" stroke-width="1" transform="translate(200,0)"/>
  <line x1="0" y1="0" x2="0" y2="900" stroke="#ffffff" stroke-opacity="0.02" stroke-width="1" transform="translate(500,0)"/>
  <line x1="0" y1="0" x2="0" y2="900" stroke="#ffffff" stroke-opacity="0.02" stroke-width="1" transform="translate(800,0)"/>
  <line x1="0" y1="0" x2="0" y2="900" stroke="#ffffff" stroke-opacity="0.02" stroke-width="1" transform="translate(1100,0)"/>
  <line x1="0" y1="0" x2="0" y2="900" stroke="#ffffff" stroke-opacity="0.02" stroke-width="1" transform="translate(1400,0)"/>
  <line x1="0" y1="0" x2="1440" y2="0" stroke="#ffffff" stroke-opacity="0.02" stroke-width="1" transform="translate(0,100)"/>
  <line x1="0" y1="0" x2="1440" y2="0" stroke="#ffffff" stroke-opacity="0.02" stroke-width="1" transform="translate(0,300)"/>
  <line x1="0" y1="0" x2="1440" y2="0" stroke="#ffffff" stroke-opacity="0.02" stroke-width="1" transform="translate(0,500)"/>
  <line x1="0" y1="0" x2="1440" y2="0" stroke="#ffffff" stroke-opacity="0.02" stroke-width="1" transform="translate(0,700)"/>
  <rect x="100" y="300" width="1" height="300" fill="#ffffff" fill-opacity="0.03" transform="rotate(-45 100 300)"/>
  <rect x="400" y="200" width="1" height="400" fill="#ffffff" fill-opacity="0.02" transform="rotate(30 400 200)"/>
  <rect x="900" y="400" width="1" height="250" fill="#ffffff" fill-opacity="0.03" transform="rotate(-60 900 400)"/>
  <rect x="1300" y="100" width="1" height="350" fill="#ffffff" fill-opacity="0.02" transform="rotate(45 1300 100)"/>
  <g opacity="0.04">
    <rect x="0" y="0" width="1440" height="900" fill="url(#g1)"/>
    <rect x="0" y="0" width="1440" height="900" fill="url(#g2)"/>
  </g>
</svg>
